# LightRAG Configuration for LumeOS Codebase
# Knowledge Graph for Code Intelligence

working_dir: ./tools/lightrag/workdir

# LLM Configuration (vLLM)
llm:
  endpoint: http://192.168.0.128:8001/v1
  model: Qwen3.6-35B
  temperature: 0.1
  max_tokens: 4096

# Embedding Configuration
embedding:
  model: text-embedding-3-small
  endpoint: https://api.openai.com/v1
  dimensions: 1536

# Graph Storage
storage:
  type: neo4j  # oder: networkx, qdrant
  neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    password: ${NEO4J_PASSWORD}

# Indexing
indexing:
  chunk_size: 1000
  chunk_overlap: 200
  include_patterns:
    - "packages/**/*.ts"
    - "services/**/*.ts"
    - "apps/**/*.ts"
    - "system/**/*.md"
    - "docs/**/*.md"
  exclude_patterns:
    - "node_modules/**"
    - "dist/**"
    - ".next/**"
    - "*.test.ts"
    - "*.spec.ts"

# Entity Extraction
entities:
  types:
    - function
    - class
    - interface
    - type
    - module
    - service
    - route
    - table
    - policy

# Relationship Types
relationships:
  - imports
  - exports
  - calls
  - implements
  - extends
  - uses
  - depends_on
  - belongs_to
