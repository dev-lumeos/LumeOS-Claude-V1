# LightRAG Configuration for LumeOS Codebase
# Knowledge Graph + Vector Search — NetworkX backend (no Neo4j needed)

working_dir: tools/lightrag/storage
graph_backend: networkx

# Embeddings: local via sentence-transformers (no extra service needed).
# Runs on CUDA if available, else CPU. Spark A has no embedding endpoint.
embedding_backend: sentence_transformers
embedding_model: all-MiniLM-L6-v2
embedding_dim: 384

# LLM: Spark A (OpenAI-compatible vLLM on Threadripper)
llm_backend: spark_a
llm_endpoint: http://192.168.0.128:8001/v1
llm_model: qwen3.6-35b-fp8

# Chunking
chunk_size: 1200
chunk_overlap: 100
