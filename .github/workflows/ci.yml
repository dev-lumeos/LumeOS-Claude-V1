name: CI
# DISABLED — 23. April 2026
# Reaktivierung: siehe docs/todos/ci-reaktivierung.md
# 
# CI wurde deaktiviert weil:
# - Projekt ist in aktiver Entwicklungsphase (Phase 1-7)
# - pnpm typecheck/lint/test sind noch nicht konfiguriert
# - Lokale Services (Supabase, Spark A/B) nicht in GitHub Actions verfügbar
#
# Um CI wieder zu aktivieren:
# 1. Kommentiere 'on:' Block wieder ein
# 2. Führe docs/todos/ci-reaktivierung.md Checklist durch

on:
  workflow_dispatch:  # Nur manuell ausführbar — kein auto-trigger

# ORIGINAL on: Block (reaktivieren wenn bereit):
# on:
#   push:
#     branches: [main, dev]
#   pull_request:
#     branches: [main, dev]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test
