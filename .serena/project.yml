languages:
- typescript

encoding: "utf-8"

ignore_all_files_in_gitignore: true

# ── DB-Layer Protection ────────────────────────────────────────────────────────
# Serena's LSP does not index SQL/migration files meaningfully.
# Excluding them prevents accidental writes and keeps the LSP index clean.
ignored_paths:
  - "supabase/migrations/**"
  - "supabase/.temp/**"
  - "supabase/.branches/**"
  - "db/migrations/**"
  - "node_modules/**"
  - "**/.git/**"
  - "**/dist/**"
  - "**/.next/**"
  - "system/state/audit.jsonl"
  - "system/state/runtime_state.json"
  - "system/state/runtime_state.lock"

read_only: false

excluded_tools: []

# ── Protection Rules (injected into every Serena session) ────────────────────
initial_prompt: |
  # LUMEOS Serena Protection Rules — DB-Layer

  These rules are mandatory. They protect the database layer from
  accidental modifications through Serena's editing tools.

  ## NIEMALS via Serena editieren:
  - supabase/migrations/**   → db-migration-agent Territorium
  - supabase/config.toml     → nur manuelle DB-Admin Änderungen
  - db/migrations/**         → db-migration-agent Territorium
  - system/state/**          → Runtime-generierte Files, kein manuelles Edit
  - .env, .env.*             → Credentials, nie editieren

  ## Serena darf LESEN (read_file, find_symbol, get_symbols_overview):
  - Alle TypeScript Files im Projekt
  - packages/types/src/** (DB-Types für Kontext)
  - supabase/migrations/** (nur lesen — für Schema-Kontext)

  ## Schreib-Tools (replace_content, replace_symbol_body, rename_symbol,
  ## safe_delete_symbol, insert_after_symbol, insert_before_symbol) NUR auf:
  - apps/**
  - services/**   (außer services/*/src/generated/**)
  - packages/**   (außer packages/supabase-clients/src/generated/**)
  - .claude/**    (skills, agents, hooks)
  - tools/**

  ## Bei Unklarheit: STOP und Tom fragen.

project_name: "LumeOS-Claude-V1"

read_only_memory_patterns: []
ignored_memory_patterns: []

included_optional_tools: []
fixed_tools: []
base_modes:
default_modes:
symbol_info_budget:
language_backend:
line_ending:
ls_specific_settings: {}
