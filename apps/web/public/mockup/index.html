<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);background:var(--surface-page);color:var(--text-primary);min-height:100vh;overflow:hidden}
.app-shell{display:flex;height:100vh;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:20px var(--layout-content-pad);display:flex;flex-direction:column;gap:16px}
.content::-webkit-scrollbar{width:var(--scrollbar-width)}
.content::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
/* Cards */
.card{background:var(--surface-card);border-radius:var(--r-lg);border:1px solid var(--surface-border);padding:var(--space-5);box-shadow:var(--shadow-sm)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)}
.card-title{font-size:var(--text-sm);font-weight:var(--fw-bold);color:var(--text-primary)}
.card-meta{font-size:var(--text-xs);color:var(--text-muted)}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3)}
/* Data Row */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--surface-border)}
.data-row:last-child{border-bottom:none}
.data-label{font-size:var(--text-sm);color:var(--text-secondary)}
.data-val{font-size:var(--text-sm);font-weight:var(--fw-semibold);color:var(--text-primary)}
/* Progress */
.progress-wrap{margin-bottom:10px}
.progress-header{display:flex;justify-content:space-between;margin-bottom:5px}
.progress-name{font-size:var(--text-xs);font-weight:var(--fw-medium);color:var(--text-secondary)}
.progress-nums{font-size:var(--text-xs);color:var(--text-muted)}
.progress-track{height:6px;background:var(--surface-hover);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s ease}
/* Stat Card */
.stat-card{background:var(--surface-card-alt);border-radius:var(--r-md);padding:14px 16px;border:1px solid var(--surface-border)}
.stat-val{font-size:22px;font-weight:var(--fw-bold);color:var(--text-primary);letter-spacing:-.5px}
.stat-lbl{font-size:var(--text-micro);color:var(--text-muted);margin-top:2px}
.stat-delta{font-size:var(--text-micro);margin-top:4px}
.delta-up{color:var(--brand-700)}.delta-dn{color:var(--semantic-danger-text)}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-micro);font-weight:var(--fw-semibold);padding:2px 8px;border-radius:var(--r-full)}
.badge-green{background:var(--semantic-success-bg);color:var(--semantic-success-text)}
.badge-orange{background:var(--semantic-warning-bg);color:var(--semantic-warning-text)}
.badge-blue{background:var(--semantic-info-bg);color:var(--semantic-info-text)}
.badge-red{background:var(--semantic-danger-bg);color:var(--semantic-danger-text)}
.badge-gray{background:var(--surface-hover);color:var(--text-tertiary)}
/* Module Gradients */
.g-dashboard{background:var(--gradient-dashboard)}
.g-nutrition{background:var(--gradient-nutrition)}
.g-training{background:var(--gradient-training)}
.g-coach{background:var(--gradient-coach)}
.g-goals{background:var(--gradient-goals)}
.g-supplements{background:var(--gradient-supplements)}
.g-recovery{background:var(--gradient-recovery)}
.g-medical{background:var(--gradient-medical)}
.g-memory{background:var(--gradient-memory)}
.g-analytics{background:var(--gradient-analytics)}
.g-marketplace{background:var(--gradient-marketplace)}
.g-admin{background:var(--gradient-admin)}
/* Chat */
.chat-area{display:flex;flex-direction:column;gap:12px}
.chat-msg-user{align-self:flex-end;max-width:70%;background:var(--brand-600);color:#fff;border-radius:14px 14px 2px 14px;padding:10px 14px;font-size:var(--text-sm);line-height:1.4}
.chat-msg-ai{align-self:flex-start;max-width:78%;background:var(--surface-card);border:1px solid var(--surface-border);border-radius:14px 14px 14px 2px;padding:10px 14px;font-size:var(--text-sm);line-height:1.4;color:var(--text-secondary);box-shadow:var(--shadow-sm)}
.chat-input-bar{display:flex;gap:8px;padding:12px 16px;background:var(--surface-card);border:1px solid var(--surface-border);border-radius:var(--r-lg);margin-top:4px}
.chat-input{flex:1;border:none;outline:none;font-size:var(--text-sm);font-family:var(--font-sans);color:var(--text-primary);background:transparent}
.chat-send{width:30px;height:30px;border-radius:var(--r-full);background:var(--brand-600);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#fff;border:none;flex-shrink:0}
.ai-card{background:linear-gradient(135deg,#eff6ff,#eef2ff);border:1px solid #bfdbfe;border-radius:var(--r-lg);padding:14px 16px;max-width:78%}
.ai-card-title{font-size:var(--text-sm);font-weight:var(--fw-semibold);color:var(--semantic-info-text);margin-bottom:5px}
.ai-card-text{font-size:var(--text-xs);color:var(--text-secondary);line-height:1.5;margin-bottom:10px}
.ai-actions{display:flex;flex-wrap:wrap;gap:6px}
.ai-btn{font-size:var(--text-micro);font-weight:var(--fw-medium);padding:5px 10px;border-radius:var(--r-md);cursor:pointer;border:1px solid}
.ai-btn-primary{background:var(--semantic-info-text);color:#fff;border-color:var(--semantic-info-text)}
.ai-btn-secondary{background:var(--surface-card);color:var(--text-secondary);border-color:var(--surface-border-strong)}
/* Meal */
.meal-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--surface-border)}
.meal-item:last-child{border-bottom:none}
.meal-dot{width:8px;height:8px;border-radius:var(--r-full);flex-shrink:0}
.meal-name{font-size:var(--text-sm);color:var(--text-secondary);flex:1}
.meal-cal{font-size:var(--text-xs);font-weight:var(--fw-semibold);color:var(--text-primary)}
.meal-macro{font-size:var(--text-micro);color:var(--text-muted)}
/* Exercise */
.exercise-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--surface-border)}
.exercise-row:last-child{border-bottom:none}
.ex-num{width:22px;height:22px;border-radius:var(--r-full);background:var(--surface-hover);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:var(--fw-bold);color:var(--text-muted);flex-shrink:0}
.ex-name{font-size:var(--text-sm);font-weight:var(--fw-medium);color:var(--text-primary);flex:1}
.ex-sets{font-size:var(--text-xs);color:var(--text-muted)}
.ex-weight{font-size:var(--text-xs);font-weight:var(--fw-semibold);color:var(--text-primary)}
/* Supplement */
.suppl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--surface-border)}
.suppl-item:last-child{border-bottom:none}
.suppl-check{width:20px;height:20px;border-radius:var(--r-full);border:2px solid var(--surface-border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.suppl-check.done{background:var(--brand-600);border-color:var(--brand-600);color:#fff;font-size:11px}
.suppl-name{font-size:var(--text-sm);font-weight:var(--fw-medium);color:var(--text-primary);flex:1}
.suppl-dose{font-size:var(--text-xs);color:var(--text-muted)}
.suppl-time{font-size:var(--text-micro);color:var(--text-muted)}
/* Recovery */
.rs-circle{width:88px;height:88px;border-radius:var(--r-full);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--gradient-recovery);box-shadow:0 6px 20px rgba(59,130,246,.3)}
.rs-val{font-size:26px;font-weight:var(--fw-bold);color:#fff}
.rs-lbl{font-size:var(--text-micro);color:rgba(255,255,255,.75)}
/* Goal */
.goal-card{background:var(--surface-card);border-radius:var(--r-lg);border:1px solid var(--surface-border);padding:16px 18px;box-shadow:var(--shadow-sm)}
/* Sub-Tab Navigation */
.subtab-nav{display:flex;gap:4px;padding:6px var(--layout-content-pad);border-bottom:1px solid var(--surface-border);overflow-x:auto;flex-shrink:0;background:var(--surface-card-alt);-ms-overflow-style:none;scrollbar-width:none}
.subtab-nav::-webkit-scrollbar{display:none}
.subtab-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-md);cursor:pointer;font-size:11px;font-weight:var(--fw-medium);color:var(--text-tertiary);transition:var(--transition-fast);white-space:nowrap;user-select:none;background:transparent;border:none}
.subtab-btn:hover{color:var(--text-secondary);background:var(--surface-hover)}
.subtab-btn.active{background:var(--surface-card);color:var(--brand-700);box-shadow:inset 0 0 0 1px var(--surface-border)}
/* Animations */
.module-content{animation:fadeIn var(--anim-fade-in) ease-out}
.typing-dot{animation:pulseSubtle var(--anim-blink) ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@media(max-width:768px){#app-sidebar{display:none}.main{flex:1}}
</style>
</head>

// ═══════════════════════════════════════════════════════════

const MODULES = {

// ═══════════════════════════════════════════════════════════
// SHELL ROUTER — Sub-Tab System
// ═══════════════════════════════════════════════════════════
let activeModule = 'training';
let activeTab = 0;
const subTabState = {};

window.switchModule = function(key) {
  activeModule = key;
  activeTab = 0;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const n = document.getElementById('nav-' + key);
  if (n) n.classList.add('active');
  renderShell();
};

window.switchTab = function(idx) {
  activeTab = idx;
  if (!subTabState[activeModule]) subTabState[activeModule] = {};
  // preserve existing sub-tab for this tab, default to 0
  if (subTabState[activeModule][idx] === undefined) subTabState[activeModule][idx] = 0;
  renderShell();
};

window.switchSubTab = function(idx) {
  if (!subTabState[activeModule]) subTabState[activeModule] = {};
  subTabState[activeModule][activeTab] = idx;
  renderShell();
};

function getActiveSubTab() {
  if (!subTabState[activeModule]) return 0;
  return subTabState[activeModule][activeTab] || 0;
}

function renderShell() {
  const m = MODULES[activeModule];
  const subTab = getActiveSubTab();
  const subTabs = m.subTabs && m.subTabs[activeTab];

  let subTabNav = '';
  if (subTabs && subTabs.length > 1) {
    subTabNav = `<div class="subtab-nav">${
      subTabs.map((st, i) =>
        `<button class="subtab-btn${i === subTab ? ' active' : ''}" onclick="switchSubTab(${i})">${st}</button>`
      ).join('')
    }</div>`;
  }

  document.getElementById('main-area').innerHTML =
    window.renderModuleHeader(m) +
    window.renderTabNav(m, activeTab) +
    subTabNav +
    `<div class="content module-content">${m.render(activeTab, subTab)}</div>`;
}

// Boot — start on Training to show new sub-tab system
document.getElementById('app-sidebar').outerHTML = window.renderSidebar(activeModule);
renderShell();
</script>
</body>
