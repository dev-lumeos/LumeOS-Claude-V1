# Paperclip — LumeOS WO Visualisierung
# Paperclip ist reines Frontend zur Darstellung von Work Orders aus Supabase.
# Keine eigene Logik, keine Agents, keine Heartbeats.
# Alle Logik läuft in unserem System (SAT-Check, Scheduler, Spark A/B).

server:
  port: 3100
  host: 127.0.0.1

database:
  # Verbindet sich mit lokaler Supabase Control Plane DB
  url: postgresql://postgres:postgres@localhost:54322/postgres

display:
  # Welche Tabellen angezeigt werden
  tables:
    - workorders
    - governance_artefacts
    - wo_failure_events
    - execution_tokens
